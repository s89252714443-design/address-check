<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инструменты</title>
<style>
:root{
  --ink:#16211b; --paper:#f3f1ea; --surface:#ffffff; --surface-2:#faf9f4;
  --primary:#1f6e43; --primary-deep:#164d30; --primary-tint:#e7f0ea;
  --amber:#b9772a; --amber-tint:#f6ecdc; --rust:#a83d2b; --rust-tint:#f4e3df;
  --slate:#3d5a72; --slate-tint:#e6edf1;
  --line:#e0dccf; --line-strong:#c9c4b4; --muted:#6c6a5e;
  --mono:ui-monospace,"SF Mono","Cascadia Code","JetBrains Mono",Consolas,monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.5;
  background-image:radial-gradient(circle at 1px 1px,rgba(22,33,27,.04) 1px,transparent 0);background-size:22px 22px}
.wrap{max-width:1080px;margin:0 auto;padding:48px 24px 96px}
@media(max-width:640px){.wrap{padding:28px 16px 64px}}

/* masthead — same identity as the tools themselves */
.masthead{display:flex;align-items:flex-start;gap:18px;border-bottom:2px solid var(--ink);padding-bottom:22px;margin-bottom:30px}
.mark{flex:none;width:52px;height:52px;border-radius:13px;background:var(--primary);position:relative;
  box-shadow:0 2px 0 var(--primary-deep)}
.mark::before,.mark::after{content:"";position:absolute;background:var(--paper)}
.mark::before{width:6px;height:26px;left:14px;top:13px;border-radius:3px;
  box-shadow:11px 0 0 var(--paper),22px 0 0 var(--paper)}
.mark::after{width:34px;height:6px;left:9px;top:33px;border-radius:3px}
h1{font-size:27px;letter-spacing:-.02em;font-weight:680;line-height:1.1}
.masthead p{color:var(--muted);font-size:14.5px;margin-top:5px;max-width:60ch}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);font-weight:600;margin-bottom:9px}

/* toolbar: search + count */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:360px}
.search-wrap svg{position:absolute;left:12px;top:50%;translate:0 -50%;width:15px;height:15px;color:var(--muted);pointer-events:none}
#search{width:100%;font-family:var(--sans);font-size:13.5px;padding:10px 12px 10px 34px;
  border:1.5px solid var(--line-strong);border-radius:10px;background:var(--surface);color:var(--ink)}
#search:focus{outline:2px solid var(--primary);outline-offset:1px}
.count{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.02em;white-space:nowrap}

/* grid of app tiles */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.grid{grid-template-columns:1fr}}

.tile{display:block;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:20px;text-decoration:none;color:var(--ink);position:relative;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
.tile:hover{transform:translateY(-2px);box-shadow:0 10px 24px -12px rgba(22,33,27,.28);border-color:var(--line-strong)}
.tile:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.tile:active{transform:translateY(0)}

.seal{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;flex:none;position:relative;
  box-shadow:0 2px 0 rgba(0,0,0,.14) inset,0 1px 0 rgba(255,255,255,.16) inset}
.seal span{font-family:var(--mono);font-weight:700;font-size:15px;color:#fff;letter-spacing:-.02em}
.seal.c-primary{background:var(--primary)}
.seal.c-amber{background:var(--amber)}
.seal.c-rust{background:var(--rust)}
.seal.c-slate{background:var(--slate)}

.tile h3{font-size:15.5px;font-weight:640;letter-spacing:-.01em;margin-top:14px}
.tile .desc{font-size:12.8px;color:var(--muted);margin-top:5px;line-height:1.45}
.tile .meta{margin-top:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 7px;border-radius:5px;font-weight:600}
.chip.tag-primary{background:var(--primary-tint);color:var(--primary-deep)}
.chip.tag-amber{background:var(--amber-tint);color:var(--amber)}
.chip.tag-rust{background:var(--rust-tint);color:var(--rust)}
.chip.tag-slate{background:var(--slate-tint);color:var(--slate)}
.arrow{position:absolute;top:20px;right:18px;width:16px;height:16px;color:var(--line-strong);transition:color .12s,transform .12s}
.tile:hover .arrow{color:var(--primary);transform:translate(2px,-2px)}

/* empty state */
.empty-state{display:none;text-align:center;padding:60px 20px;color:var(--muted);font-size:13.5px}
.empty-state.show{display:block}

/* placeholder tile — hints that more tools land here */
.tile.ghost{border-style:dashed;border-color:var(--line-strong);background:transparent;box-shadow:none;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;min-height:118px;cursor:default}
.tile.ghost:hover{transform:none;box-shadow:none}
.tile.ghost .desc{margin-top:6px}

footer{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
footer span{font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <div class="mark"></div>
    <div>
      <div class="eyebrow">Внутренние инструменты</div>
      <h1>Инструменты</h1>
      <p>Рабочие инструменты, собранные в одном месте. Открой нужный — он работает прямо в браузере, без установки.</p>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Найти инструмент…" autocomplete="off">
    </div>
    <div class="count" id="count"></div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState">Ничего не найдено. Попробуй другой запрос.</div>

  <footer>
    <span id="toolCount"></span>
    <span>Новые инструменты появляются здесь по мере создания</span>
  </footer>

</div>

<script>
/* ===========================================================
   Реестр инструментов.
   Чтобы добавить новый инструмент — добавь один объект в массив.
   href — путь к html-файлу инструмента (в папке tools/).
   accent — один из: primary | amber | rust | slate
   =========================================================== */
const TOOLS = [
  {
    title: "Сверка адресов ЛПУ",
    desc: "Сравнивает адреса из наших источников со списком из ТЗ: находит совпадения, недостающие и спорные адреса.",
    href: "tools/sverka-adresov-lpu.html",
    tags: ["Адреса", "Excel"],
    accent: "primary",
    monogram: "СА"
  }
];

const ACCENT_CLASS = { primary:"c-primary", amber:"c-amber", rust:"c-rust", slate:"c-slate" };
const TAG_CLASS = { primary:"tag-primary", amber:"tag-amber", rust:"tag-rust", slate:"tag-slate" };

function renderTiles(list){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = list.map(t => `
    <a class="tile" href="${t.href}">
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg>
      <div class="seal ${ACCENT_CLASS[t.accent]||'c-primary'}"><span>${t.monogram}</span></div>
      <h3>${t.title}</h3>
      <div class="desc">${t.desc}</div>
      <div class="meta">${t.tags.map(tag=>`<span class="chip ${TAG_CLASS[t.accent]||'tag-primary'}">${tag}</span>`).join('')}</div>
    </a>
  `).join('') + `
    <div class="tile ghost">
      <div class="desc">Следующий инструмент появится здесь.</div>
    </div>
  `;
  empty.classList.toggle('show', list.length===0);
  document.getElementById('count').textContent = list.length + ' из ' + TOOLS.length;
  document.getElementById('toolCount').textContent = 'Всего инструментов: ' + TOOLS.length;
}

document.getElementById('search').addEventListener('input', e=>{
  const q = e.target.value.trim().toLowerCase();
  const filtered = !q ? TOOLS : TOOLS.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q) ||
    t.tags.some(tag=>tag.toLowerCase().includes(q))
  );
  renderTiles(filtered);
});

renderTiles(TOOLS);
</script>
</body>
</html>
